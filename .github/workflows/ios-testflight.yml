name: iOS Build & TestFlight Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'level-editor.html'
      - 'boss-viewer.html'
      - 'boss-attack-viewer.html'
  workflow_dispatch:

env:
  CORDOVA_VERSION: "12"
  CORDOVA_IOS_VERSION: "7.1.1"
  NODE_VERSION: "20"
  APP_ID: "com.easierbycode.game2028.ai"
  APP_NAME: "2028.ai"

jobs:
  ios-build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Cordova CLI
        run: npm i -g cordova@${{ env.CORDOVA_VERSION }}

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Apple Certificate & Provisioning Profile ──────────────────────
      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Decode provisioning profile
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile (must be named by its UUID)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< \
            $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision

      # ── Cordova Project Setup ─────────────────────────────────────────
      - name: Create Cordova project
        run: |
          cordova create cordova ${{ env.APP_ID }} "${{ env.APP_NAME }}"
          cd cordova
          cordova platform add ios@${{ env.CORDOVA_IOS_VERSION }}

      - name: Copy config.xml
        run: cp config.xml cordova/config.xml

      - name: Update config.xml for Phaser entry point
        run: |
          sed -i '' 's|<content src="index.html" />|<content src="phaser-game.html" />|' cordova/config.xml

      - name: Copy hooks
        run: cp -r hooks cordova/hooks

      # ── Prepare www with Phaser build ─────────────────────────────────
      - name: Prepare Cordova www (Phaser version)
        run: |
          rm -rf cordova/www/*
          cp -r assets cordova/www/
          cp -r src cordova/www/
          cp -r icons cordova/www/
          cp manifest.json cordova/www/ || true
          cp favicon.ico cordova/www/ || true
          cp phaser-game.html cordova/www/

          # Inject cordova.js before closing </head>
          sed -i '' 's|</head>|<script src="cordova.js"></script></head>|' cordova/www/phaser-game.html

      - name: Prepare Cordova iOS
        working-directory: cordova
        run: cordova prepare ios

      # ── Export Options & Build ─────────────────────────────────────────
      - name: Create ExportOptions.plist
        run: |
          cat > cordova/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.easierbycode.game2028.ai</key>
                  <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Debug provisioning profile
        run: |
          echo "Installed profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "---"
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            echo "Profile: $f"
            security cms -D -i "$f" | plutil -extract Name raw - || true
            security cms -D -i "$f" | plutil -extract UUID raw - || true
            security cms -D -i "$f" | plutil -extract Entitlements.application-identifier raw - || true
            echo "---"
          done

      - name: Build iOS archive
        working-directory: cordova/platforms/ios
        run: |
          xcodebuild archive \
            -workspace "${{ env.APP_NAME }}.xcworkspace" \
            -scheme "${{ env.APP_NAME }}" \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -exportOptionsPlist cordova/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/export/*.ipa

      # ── Upload to TestFlight ──────────────────────────────────────────
      - name: Upload to TestFlight via App Store Connect API
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          # Write the API key to a file
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Upload using xcrun altool (or notarytool)
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/${{ env.APP_NAME }}.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      # ── Cleanup ───────────────────────────────────────────────────────
      - name: Clean up keychain and provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision || true
          rm -rf ~/.appstoreconnect || true
